name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: 1.3.14

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recurva
          POSTGRES_PASSWORD: recurva
          POSTGRES_DB: recurva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run migrations
        run: bun run migrate
        env:
          DATABASE_URL: postgresql://recurva:recurva@localhost:5432/recurva_test
          NODE_ENV: test

      - name: Run tests
        run: bun test
        env:
          DATABASE_URL: postgresql://recurva:recurva@localhost:5432/recurva_test
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          NOMBA_INBOUND_WEBHOOK_SECRET: ${{ secrets.TEST_NOMBA_WEBHOOK_SECRET }}
