name: Production Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recurva
          POSTGRES_PASSWORD: recurva
          POSTGRES_DB: recurva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run migrations
        run: bun run migrate
        env:
          DATABASE_URL: postgresql://recurva:recurva@localhost:5432/recurva_test
          NODE_ENV: test

      - name: Run tests
        run: bun test
        env:
          DATABASE_URL: postgresql://recurva:recurva@localhost:5432/recurva_test
          NODE_ENV: test
          JWT_SECRET: test-secret

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Validate secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$PROD_HOST" ]; then
            echo "::error::PROD_HOST secret is not set — add it in GitHub repo settings"
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi

      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --exclude node_modules --exclude .env --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "ubuntu@${PROD_HOST}:/opt/recurva/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "ubuntu@${PROD_HOST}" \
            "cd /opt/recurva && docker compose up -d --build"

      - name: Run migrations on production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "ubuntu@${PROD_HOST}" \
            "docker run --rm \
              -v /opt/recurva:/app \
              -w /app \
              --network \"\$(docker inspect recurva-db -f '{{range \$net, \$v := .NetworkSettings.Networks}}{\$net}{{end}}')\" \
              --env-file /opt/recurva/.env \
              oven/bun:1 \
              bun run src/db/migrate.ts"
