name: Staging Deploy

on:
  push:
    branches: [staging]

env:
  BUN_VERSION: 1.3.14

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Validate secrets
        env:
          DEV_HOST: ${{ secrets.DEV_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$DEV_HOST" ]; then
            echo "::error::DEV_HOST secret is not set — add it in GitHub repo settings"
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi

      - name: Deploy to dev server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEV_HOST: ${{ secrets.DEV_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --exclude node_modules --exclude .env --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "ubuntu@${DEV_HOST}:/opt/recurva/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "ubuntu@${DEV_HOST}" \
            "cd /opt/recurva && docker compose up -d --build"

      - name: Run migrations on dev server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEV_HOST: ${{ secrets.DEV_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "ubuntu@${DEV_HOST}" \
            'NETWORK=$(docker inspect recurva-db -f "{{range \$net, \$v := .NetworkSettings.Networks}}{{\$net}}{{end}}")
            docker run --rm \
              -v /opt/recurva:/app \
              -w /app \
              --network "$NETWORK" \
              --env-file /opt/recurva/.env \
              oven/bun:1 \
              bun run src/db/migrate.ts'
