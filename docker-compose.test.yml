services:
  db:
    image: postgres:16-alpine
    container_name: recurva-test-db
    environment:
      - POSTGRES_USER=recurva
      - POSTGRES_PASSWORD=recurva
      - POSTGRES_DB=recurva_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recurva"]
      interval: 3s
      timeout: 3s
      retries: 5
