services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: recurva-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://recurva:recurva@db:5432/recurva
      - DATABASE_SSL=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    container_name: recurva-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=recurva
      - POSTGRES_PASSWORD=recurva
      - POSTGRES_DB=recurva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recurva"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
